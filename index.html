<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Feed — The Business Model</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="slide" aria-labelledby="slide-title">
    <header class="topbar">
      <p><span aria-hidden="true">•</span> The Invisible Editor</p>
      <p class="counter">03 / 12</p>
    </header>

    <section class="hero">
      <p class="eyebrow">The Business Model</p>

      <h1 id="slide-title">
        <span>Not informed.</span>
        <span class="red">Engaged.</span>
      </h1>
    </section>

    <section class="interaction" aria-labelledby="prompt">
      <div class="quotes">
        <p id="prompt" class="label">Choose the platform promise that sounds most convincing</p>

        <button data-result="time">
          “Connecting you with what matters most.”
        </button>

        <button data-result="predict">
          “A personalised experience just for you.”
        </button>

        <button data-result="ads">
          “Bringing the world closer together.”
        </button>
      </div>

      <div class="reveal" aria-live="polite">
        <p class="label red-label">The system heard</p>
        <h2 id="result-title">Make a choice</h2>
        <p id="result-text">
          Select one of the platform statements to reveal what the feed may optimise for.
        </p>
      </div>
    </section>

    <button id="resetBtn" class="reset" hidden>Try another choice</button>
  </main>

  <script src="app.js"></script>
</body>
</html>
